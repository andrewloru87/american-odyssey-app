<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>American Odyssey</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .container {
            text-align: center;
            padding: 40px 20px;
        }
        h1 { font-size: 48px; margin-bottom: 16px; }
        p { font-size: 18px; margin-bottom: 32px; opacity: 0.9; }
        .btn {
            display: inline-block;
            padding: 16px 32px;
            background: white;
            color: #667eea;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 16px;
            transition: all 0.3s;
        }
        .btn:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
    </style>
</head>
<body>
    <div class="container">
        <h1>✈️ American Odyssey</h1>
        <p>25 giorni, 5000+ km, una storia da raccontare</p>
        <a href="./app.html" class="btn">🚀 Apri l'App</a>
    </div>
</body>
</html>
